<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gustavo Martinez - Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: #000;
        }

        .splash-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background-image: url('assets/photos/splash.jpg');
            /* Placeholder, user needs to add image */
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Overlay to ensure text visibility if needed, or just for mood */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.1);
        }

        .enter-button {
            position: absolute;
            bottom: 8rem;
            right: 2rem;
            font-size: 1.2rem;
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 500;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .enter-button:hover {
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <div class="splash-container">
        <!-- Placeholder for the splash image. 
             Ideally, the user should place a 'splash.jpg' in 'assets/photos/' 
             or we can use a generated placeholder if needed. -->
        <a href="home.html" class="enter-button">Enter ></a>
    </div>

</body>

</html>
